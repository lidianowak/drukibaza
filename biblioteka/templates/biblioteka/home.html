{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strona w budowie</title>

    <!-- Czcionka Bona Nova (styl italic) z Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bona+Nova:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            font-family: "Bona Nova", serif;
            padding: 40px 20px;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 60px;
        }

        .logo {
            max-width: 500px;
            width: 30vw;
        }

        .tekst-grafika-blok {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 24px;
        }

        h1 {
            font-family: "Bona Nova", serif;
            font-style: italic;
            font-weight: 400;
            font-size: 2rem;
            color: #4a4a4a;
            margin: 0;
            text-align: left;
            white-space: nowrap;
        }

        .grafika {
            max-width: 90px;
            width: 30vw;
            height: auto;
            flex-shrink: 0;
        }

        /* Tablety */
        @media (max-width: 768px) {
            .wrapper {
                gap: 40px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .logo {
                max-width: 100px;
            }

            .grafika {
                max-width: 90px;
            }
        }

        /* Telefony */
        @media (max-width: 480px) {
            body {
                padding: 24px 16px;
            }

            .wrapper {
                gap: 30px;
            }

            .logo {
                max-width: 80px;
            }

            .tekst-grafika-blok {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            h1 {
                font-size: 1.2rem;
                white-space: normal;
            }

            .grafika {
                max-width: 90px;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- Logotyp -->
        <img class="logo" src="{% static 'images/logotyp2.svg' %}" alt="Logo BiDO">

        <div class="tekst-grafika-blok">
            <h1>Strona w budowie. Zapraszam wkrótce! </h1>

            <!-- Grafika łabędzia -->
            <img class="grafika" src="{% static 'images/labedz w gniezdzie.svg' %}" alt="Ilustracja łabędzia w gnieździe">
        </div>
    </div>

</body>
</html>
